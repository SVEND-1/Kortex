spring.application.name=product-service
server.port=8082

eureka.client.service-url.defaultZone=http://localhost:8089/eureka

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:svend123}
spring.data.redis.database=1

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/kortexshop?currentSchema=product
spring.datasource.username=postgres
spring.datasource.password=svend123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=product
spring.jpa.properties.hibernate.format_sql=true

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=product-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.secure=false
minio.buckets.product-images=product-images
minio.validation.max-file-size=5MB
minio.validation.allowed-types=image/jpeg,image/png,image/gif,image/webp

# Logging
logging.level.org.example.productservice=DEBUG