spring.application.name=payment-service
server.port=8084

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/kortexshop?currentSchema=payment
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=payment
spring.jpa.properties.hibernate.format_sql=true

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=payment-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Yookassa (?Kassa)
#yookassa.shop-id=${YOOKASSA_SHOP_ID}
#yookassa.secret-key=${YOOKASSA_SECRET_KEY}
#yookassa.return-url=http://localhost:8080/api/payments/return
#yookassa.webhook-url=http://localhost:8084/api/payments/webhook

# Logging
logging.level.org.example.paymentservice=DEBUG
logging.level.ru.loolzaaa.youkassa=DEBUG