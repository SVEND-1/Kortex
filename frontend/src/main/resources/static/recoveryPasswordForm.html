<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/mainFormStyle.css">
    <link rel="stylesheet" href="css/authStyle.css">
    <title>Восстановление пароля</title>
</head>
<body>
<!--Шапка страницы-->
<header class="header">
    <div class="container">
        <div class="header-content">
            <a href="/" class="logo">Kortex marketplace</a>

            <form class="search-form" action="/search" method="GET">
                <div class="search-container">
                    <input id="search-input" type="text" class="search-input" placeholder="Поиск товаров...">
                    <button type="submit" class="search-button">
                        <img id="findImg" src="/images/findImg.png" alt="Поиск">
                    </button>
                </div>
            </form>

            <nav class="nav">
                <a href="/cart" class="nav-link">
                    <img src="/images/cart-img.png" alt="Корзина" class="nav-icon">
                    Корзина
                </a>

                <a href="/profile" class="nav-link">
                    <img src="/images/profile-img.png" alt="Профиль" class="nav-icon profile-icon">
                    <span class="profile-text">Профиль</span>
                </a>

                <a href="/login" class="nav-link">
                    <img src="/images/join-img.png" alt="Войти" class="nav-icon">
                    Войти
                </a>
            </nav>
        </div>
    </div>
</header>

<!-- Форма восстановления пароля -->
<main class="auth-container">
    <div class="auth-form">
        <h2 class="registerH2">Восстановление пароля</h2>

        <form class="loginForm" id="recoveryPasswordForm">
            <label>Пароль</label>
            <input type="password" name="password" id="recoveryPassword" placeholder="Введите новый пароль" required>

            <label>Подтвердите пароль</label>
            <input type="password" name="confirmPassword" id="recoveryConfirmPassword" placeholder="Подтвердите новый пароль" required>

            <button type="button" id="continueBtn2" class="loginBtn">Сохранить новый пароль</button>
        </form>

        <div class="auth-links">
            <a href="/login" class="toLogin">Вернуться ко входу</a>
            <a href="/" class="back-to-main">Вернуться на главную</a>
        </div>
    </div>
</main>

<script src="js/authScript.js"></script>
<script src="js/api-integration.js"></script>
</body>
</html>
