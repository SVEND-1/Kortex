<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/mainFormStyle.css">
    <link rel="stylesheet" href="css/authStyle.css">
    <link rel="stylesheet" href="css/sellerStyle.css">
    <title>Панель продавца</title>
</head>
<body>
<!--Шапка страницы-->

    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">Kortex marketplace</a>

                <form class="search-form" action="/search" method="GET">
                    <div class="search-container">
                        <input id="search-input" type="text" class="search-input" placeholder="Поиск товаров...">
                        <button type="submit" class="search-button">
                            <img id="findImg" src="images/findImg.png" alt="Поиск">
                        </button>
                    </div>
                </form>

                <nav class="nav">
                    <a href="/cart" class="nav-link">
                        <img src="images/cart-img.png" alt="Корзина" class="nav-icon">
                        Корзина
                    </a>

                    <a href="/profile" class="nav-link">
                        <img src="images/profile-img.png" alt="Профиль" class="nav-icon profile-icon">
                        <span class="profile-text">Профиль</span>
                    </a>

                    <a href="/login" class="nav-link">
                        <img src="images/join-img.png" alt="Войти" class="nav-icon">
                        Войти
                    </a>
                </nav>
            </div>
        </div>
    </header>


<!-- Панель продавца с табами -->
<main class="auth-container">
    <div class="auth-form">
        <h2 class="registerH2">Панель продавца</h2>

        <!-- Табы -->
        <div class="tabs">
            <button class="tab-button active" data-tab="add">Добавить товар</button>
            <button class="tab-button" data-tab="edit">Редактировать товары</button>
        </div>

        <!-- Контент таба "Добавить товар" -->
        <div id="add-tab" class="tab-content active">
            <form class="loginForm" id="add-product-form">
                <label>Название товара</label>
                <input type="text" id="add-name" placeholder="Введите название товара" required>

                <label>Цена</label>
                <input type="number" id="add-price" placeholder="0" min="0" step="0.01" required>

                <label>Количество на складе</label>
                <input type="number" id="add-count" placeholder="0" min="0" required>

                <label>Категория</label>
                <select id="add-category" required>
                    <option value="">Выберите категорию</option>
                    <option value="ELECTRONICS">Электроника</option>
                    <option value="CLOTHING">Одежда</option>
                    <option value="BOOKS">Книги</option>
                    <option value="FOOD">Еда</option>
                    <option value="SPORTS">Спорт товары</option>
                    <option value="HOME">Товары для дома</option>
                    <option value="BEAUTY">Красота</option>
                    <option value="OTHER">Другое</option>
                </select>

                <label>Описание</label>
                <textarea id="add-description" placeholder="Описание товара..." rows="4" required></textarea>

                <label>Изображение товара</label>
                <div class="file-input-container">
                    <input type="file" id="add-imageFile" accept="image/*" class="file-input">
                    <label for="add-imageFile" class="file-input-label">
                        Выберите файл
                    </label>
                    <span class="file-name" id="add-fileName">Файл не выбран</span>
                </div>

                <div class="form-buttons">
                    <button type="button" id="add-submit-btn" class="loginBtn">Добавить товар</button>
                    <button type="reset" class="loginBtn reset-btn">Очистить</button>
                </div>
            </form>
        </div>

        <!-- Контент таба "Редактировать товары" -->
        <div id="edit-tab" class="tab-content active">
            <div class="products-grid-container">
                <div id="products-container" class="products-grid">
                    <!-- Товары будут загружаться здесь -->
                    <p class="loading-text">Загрузка товаров...</p>
                </div>
            </div>
        </div>

        <!-- Модальное окно редактирования товара -->
        <div id="edit-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Редактировать товар</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <form class="loginForm" id="edit-product-form">
                        <input type="hidden" id="edit-id">

                        <div class="edit-form-grid">
                            <!-- Левая колонка: изображение -->
                            <div class="edit-image-column">
                                <div class="image-preview-container">
                                    <div class="current-image-wrapper">
                                        <img id="current-image" src="" alt="Текущее изображение">
                                        <div class="image-overlay">
                                            <span>Текущее изображение</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="image-upload-section">
                                    <label>Новое изображение</label>
                                    <div class="file-input-container">
                                        <input type="file" id="edit-imageFile" accept="image/*" class="file-input">
                                        <label for="edit-imageFile" class="file-input-label">
                                            Выберите файл
                                        </label>
                                        <span class="file-name" id="edit-fileName">Файл не выбран</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Правая колонка: форма -->
                            <div class="edit-form-column">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Название товара *</label>
                                        <input type="text" id="edit-name" placeholder="Введите название товара" required>
                                    </div>

                                    <div class="form-group">
                                        <label>Цена (₽) *</label>
                                        <input type="number" id="edit-price" placeholder="0" min="0" step="0.01" required>
                                    </div>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Количество *</label>
                                        <input type="number" id="edit-count" placeholder="0" min="0" required>
                                    </div>

                                    <div class="form-group">
                                        <label>Категория *</label>
                                        <select id="edit-category" required>
                                            <option value="">Выберите категорию</option>
                                            <option value="ELECTRONICS">Электроника</option>
                                            <option value="CLOTHING">Одежда</option>
                                            <option value="BOOKS">Книги</option>
                                            <option value="FOOD">Еда</option>
                                            <option value="SPORTS">Спорт товары</option>
                                            <option value="HOME">Товары для дома</option>
                                            <option value="BEAUTY">Красота</option>
                                            <option value="OTHER">Другое</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>Описание</label>
                                    <textarea id="edit-description" placeholder="Описание товара..." rows="4"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="modal-actions">
                            <button type="button" id="update-submit-btn" class="loginBtn">Сохранить изменения</button>
                            <button type="button" id="cancel-edit" class="loginBtn reset-btn">Отмена</button>
                            <button type="button" id="delete-product" class="loginBtn delete-btn">Удалить товар</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="js/sellerScript.js"></script>
<script src="js/productManager.js"></script>
</body>
</html>
