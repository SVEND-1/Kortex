<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/mainFormStyle.css">
    <link rel="stylesheet" href="css/productStyle.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <title>О товаре - Онлайн магазин</title>

    <style>
        /* Дополнительные стили для карусели изображений */
        .product-images {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .main-image {
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            overflow: hidden;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .main-image img {
            width: 100%;
            height: auto;
            object-fit: contain;
            transition: transform 0.2s;
        }
        .thumbnails {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            background: #f1f3f5;
        }
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .thumbnail.active {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        .thumbnail:hover:not(.active) {
            border-color: #cbd5e1;
            transform: scale(1.02);
        }
        @media (max-width: 768px) {
            .thumbnail {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <div class="header-content">
            <a href="/" class="logo">Kortex marketplace</a>

            <form class="search-form" id="searchForm">
                <div class="search-container">
                    <input id="search-input" type="text" class="search-input" placeholder="Поиск товаров...">
                    <button type="submit" class="search-button">
                        <img src="images/findImg.png" alt="Поиск">
                    </button>
                </div>
            </form>

            <nav class="nav">
                <a href="/cart" class="nav-link">
                    <img src="images/cart-img.png" class="nav-icon" alt="Корзина">
                    Корзина
                </a>
                <a href="/profile" class="nav-link">
                    <img src="images/profile-img.png" class="nav-icon" alt="Профиль">
                    Профиль
                </a>
                <a href="/login" class="nav-link">
                    <img src="images/join-img.png" class="nav-icon" alt="Войти">
                    Войти
                </a>
            </nav>
        </div>
    </div>
</header>

<main class="product-container">
    <div class="container">

        <a href="/" class="back-button">← Назад к каталогу</a>

        <div id="product-content" class="product-content">

            <div class="product-images">
                <div class="main-image">
                    <img id="mainImage" src="images/product-img.png" alt="Товар">
                </div>
                <div id="thumbnailsContainer" class="thumbnails">
                    <!-- сюда будут подгружены миниатюры -->
                </div>
            </div>

            <div class="product-info">
                <div class="product-header">
                    <h1 id="productTitle" class="product-title">Загрузка...</h1>
                    <div id="productCategory" class="product-category"></div>
                </div>

                <div class="product-price">
                    <span id="productPrice" class="current-price">0 ₽</span>
                </div>

                <div id="productStock" class="product-stock">
                    В наличии: —
                </div>

                <div class="product-description">
                    <h3>Описание</h3>
                    <p id="productDescription">Загрузка...</p>
                </div>

                <div class="product-meta">
                    <div class="meta-item">
                        <strong>Категория:</strong>
                        <span id="productCategoryFull">-</span>
                    </div>
                </div>

                <div class="product-actions">
                    <button id="addToCartBtn" class="btn btn-primary btn-large">
                        🛒 Добавить в корзину
                    </button>
                    <div id="successMessage" class="success-message" style="display:none;">
                        Товар добавлен в корзину!
                    </div>
                    <div id="errorMessage" class="error-message" style="display:none;">
                        Ошибка
                    </div>
                </div>
            </div>
        </div>

        <div id="errorBlock" style="display:none; padding:40px; text-align:center;">
            <h2>Ошибка</h2>
            <p id="errorText">Не удалось загрузить товар</p>
            <button onclick="history.back()" class="btn">Назад</button>
        </div>

    </div>
</main>

<script>
    $(document).ready(function() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
            showError("ID товара не указан");
            return;
        }

        loadProduct(id);
        setupSearch();
    });

    // Поиск (как на главной)
    function setupSearch() {
        const $searchForm = $('#searchForm');
        const $searchInput = $('#search-input');

        $searchForm.on('submit', function(e) {
            e.preventDefault();
            const query = $searchInput.val().trim();
            if (query) {
                window.location.href = `/?search=${encodeURIComponent(query)}`;
            }
        });
    }

    async function loadProduct(id) {
        try {
            const res = await fetch(`/api/products/${id}`);
            if (!res.ok) throw new Error("Товар не найден");
            const product = await res.json();
            fillProduct(product);
        } catch (e) {
            console.error(e);
            showError("Не удалось загрузить товар");
        }
    }

    function fillProduct(p) {
        // Основные данные
        $("#productTitle").text(p.name || "Без названия");
        $("#productCategory").text(p.category || "");
        $("#productCategoryFull").text(p.category || "—");
        $("#productPrice").text(formatPrice(p.price));
        $("#productStock").text(`✓ В наличии: ${p.count} шт.`);
        $("#productDescription").text(p.description || "Описание отсутствует");

        // --- Работа с изображениями (массив images) ---
        let imagesList = [];
        if (p.images && Array.isArray(p.images) && p.images.length > 0) {
            imagesList = p.images;
        } else if (p.image) {
            // fallback для старых данных
            imagesList = [p.image];
        }

        if (imagesList.length === 0) {
            imagesList = ['/images/product-img.png'];
        }

        // Преобразуем в полные URL, если нужно
        const fullUrls = imagesList.map(img => {
            if (!img) return '/images/product-img.png';
            if (img.startsWith('http://') || img.startsWith('https://')) {
                return img;
            }
            return `/uploads/images/${img}`;
        });

        // Устанавливаем первое изображение
        $("#mainImage").attr("src", fullUrls[0]);

        // Генерируем миниатюры
        const $thumbContainer = $("#thumbnailsContainer");
        $thumbContainer.empty();

        fullUrls.forEach((url, idx) => {
            const $thumb = $(`
                <div class="thumbnail ${idx === 0 ? 'active' : ''}" data-index="${idx}">
                    <img src="${url}" alt="Миниатюра ${idx+1}">
                </div>
            `);
            $thumb.on('click', function() {
                // Меняем главное изображение
                $("#mainImage").attr("src", url);
                // Обновляем активный класс
                $thumbContainer.find('.thumbnail').removeClass('active');
                $(this).addClass('active');
            });
            $thumbContainer.append($thumb);
        });

        // Инициализируем добавление в корзину
        initAddToCart(p.id);
    }

    function initAddToCart(productId) {
        const $btn = $("#addToCartBtn");
        $btn.off('click').on('click', async function() {
            try {
                $btn.prop("disabled", true);
                const response = await fetch(`/api/carts/items?productId=${productId}`, {
                    method: "POST",
                    headers: { "Accept": "application/json" },
                    credentials: "include"
                });
                if (response.redirected || response.url.includes("/login")) {
                    window.location.href = "/login";
                    return;
                }
                const contentType = response.headers.get("content-type");
                if (contentType && contentType.includes("text/html")) {
                    window.location.href = "/login";
                    return;
                }
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error || "Ошибка при добавлении в корзину");
                }
                $("#successMessage").show();
                setTimeout(() => $("#successMessage").hide(), 2000);
            } catch (e) {
                console.error(e);
                $("#errorMessage").text("❌ " + e.message).show();
                setTimeout(() => $("#errorMessage").hide(), 3000);
            } finally {
                $btn.prop("disabled", false);
            }
        });
    }

    function formatPrice(price) {
        let num = (typeof price === 'string') ? parseFloat(price) : price;
        if (isNaN(num)) num = 0;
        return new Intl.NumberFormat("ru-RU", {
            style: "currency",
            currency: "RUB",
            minimumFractionDigits: 0
        }).format(num);
    }

    function showError(msg) {
        $("#product-content").hide();
        $("#errorText").text(msg);
        $("#errorBlock").show();
    }
</script>
</body>
</html>
