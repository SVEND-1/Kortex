<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/mainFormStyle.css">
    <link rel="stylesheet" href="css/authStyle.css">
    <title>Вход в аккаунт</title>

</head>
<body>
<!--Шапка страницы-->
<header class="header">
    <div class="container">
        <div class="header-content">
            <a href="/" class="logo">Kortex marketplace</a>

            <form class="search-form">
                <div class="search-container">
                    <input id="search-input" type="text" class="search-input" placeholder="Поиск товаров...">
                    <button type="submit" class="search-button">
                        <img id="findImg" src="/images/findImg.png" alt="Поиск">
                    </button>
                </div>
            </form>

            <nav class="nav">
                <a href="/cart" class="nav-link">
                    <img src="/images/cart-img.png" alt="Корзина" class="nav-icon">
                    Корзина
                </a>

                <a href="/profile" class="nav-link">
                    <img src="/images/profile-img.png" alt="Профиль" class="nav-icon profile-icon">
                    <span class="profile-text">Профиль</span>
                </a>

                <a href="/login" class="nav-link">
                    <img src="/images/join-img.png" alt="Войти" class="nav-icon">
                    Войти
                </a>
            </nav>
        </div>
    </div>
</header>


<main class="auth-container">
    <div class="auth-form">
        <h2 class="registerH2">Вход в аккаунт</h2>

        <!-- Сообщение об ошибке -->
        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <form id="loginForm" class="loginForm">
            <label>Email</label>
            <input type="email" id="email" name="email" placeholder="Почта" required>

            <label>Пароль</label>
            <input type="password" id="password" name="password" placeholder="Пароль" required>

            <button type="submit" class="loginBtn">Войти</button>
        </form>

        <div class="auth-links">
            <a href="/register" class="toRegistration">Зарегистрироваться</a>
            <a href="/forgotPassword" class="forgotPassword">Забыли пароль?</a>
            <a href="/" class="back-to-main">Вернуться на главную</a>
        </div>
    </div>
</main>



<style>
    .error-message {
        background-color: #f8d7da;
        color: #721c24;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 15px;
        border: 1px solid #f5c6cb;
    }
</style>

<script src="js/api-integration.js"></script>
</body>
</html>
