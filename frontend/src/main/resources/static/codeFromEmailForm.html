<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/mainFormStyle.css">
    <link rel="stylesheet" href="/css/authStyle.css">
    <title>Подтверждение кода</title>
    <style>
        .code-input {
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            vertical-align: middle !important;
        }
    </style>
</head>
<body>
<!--Шапка страницы-->
<header class="header">
    <div class="container">
        <div class="header-content">
            <a href="/" class="logo">Kortex marketplace</a>

            <form class="search-form" action="/search" method="GET">
                <div class="search-container">
                    <input id="search-input" type="text" class="search-input" placeholder="Поиск товаров...">
                    <button type="submit" class="search-button">
                        <img id="findImg" src="/images/findImg.png" alt="Поиск">
                    </button>
                </div>
            </form>

            <nav class="nav">
                <a href="/cart" class="nav-link">
                    <img src="/images/cart-img.png" alt="Корзина" class="nav-icon">
                    Корзина
                </a>
                <a href="/profile" class="nav-link">
                    <img src="/images/profile-img.png" alt="Профиль" class="nav-icon profile-icon">
                    <span class="profile-text">Профиль</span>
                </a>
                <a href="/login" class="nav-link">
                    <img src="/images/join-img.png" alt="Войти" class="nav-icon">
                    Войти
                </a>
            </nav>
        </div>
    </div>
</header>

<!-- Форма ввода кода -->
<main class="auth-container">
    <div class="auth-form code-form">
        <h2 class="registerH2">Ввод кода</h2>

        <div class="notification-info">
            <div class="notification-icon">🔔</div>
            <p>Откройте уведомление в приложении почты</p>
        </div>

        <p class="code-message">Вам пришло уведомление</p>
        <p class="code-hint">Код XXX-XXX</p>

        <form class="loginForm" id="codeFromEmailForm">
            <div class="code-inputs-container">
                <div class="code-inputs">
                    <input type="text" maxlength="1" inputmode="numeric" class="code-input" name="code1" required>
                    <input type="text" maxlength="1" inputmode="numeric" class="code-input" name="code2" required>
                    <input type="text" maxlength="1" inputmode="numeric" class="code-input" name="code3" required>
                    <span class="code-separator">-</span>
                    <input type="text" maxlength="1" inputmode="numeric" class="code-input" name="code4" required>
                    <input type="text" maxlength="1" inputmode="numeric" class="code-input" name="code5" required>
                    <input type="text" maxlength="1" inputmode="numeric" class="code-input" name="code6" required>
                </div>
            </div>

            <div class="resend-code">
                <button type="button" class="resend-btn" id="resendCodeBtn">
                    Запросить новый код
                </button>
                <div class="timer" id="timer">01:00</div>
            </div>

            <button type="button" id="continueBtn1" class="loginBtn">Подтвердить</button>
        </form>

        <div class="auth-links">
            <a href="/forgotPassword" class="back-link">Вернуться назад</a>
            <a href="/" class="back-to-main">Вернуться на главную</a>
        </div>
    </div>
</main>

<!-- ВАЖНО: codeFromEmail.js первым (определяет window.resetTimer до api-integration.js) -->
<script src="/js/codeFromEmail.js"></script>
<script src="/js/api-integration.js"></script>
</body>
</html>
