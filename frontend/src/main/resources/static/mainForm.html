<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/mainFormStyle.css">
    <link rel="stylesheet" href="css/catalogStyle.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <title>Kortex</title>
    <style>
        /* Дополнительные стили для пагинации */
        .pagination-container {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            width: 100%;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 0 auto;
        }

        .pagination-btn {
            padding: 12px 24px;
            background: white;
            color: #333;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            min-width: 140px;
        }

        .pagination-btn:hover:not(:disabled) {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f8f9fa;
        }

        .pagination-numbers {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .pagination-number {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7fafc;
            color: #4a5568;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .pagination-number:hover {
            background: #e2e8f0;
        }

        .pagination-number.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .pagination-ellipsis {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            color: #999;
        }

        .page-info {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<!--Шапка страницы-->
<header class="header">
    <div class="container">
        <div class="header-content">
            <a href="/" class="logo">Kortex</a>

            <form class="search-form" action="/search" method="GET">
                <div class="search-container">
                    <input id="search-input" type="text" class="search-input" placeholder="Поиск товаров...">
                    <button type="submit" class="search-button">
                        <img id="findImg" src="images/findImg.png" alt="Поиск">
                    </button>
                </div>
            </form>

            <nav class="nav">
                <a href="/cart" class="nav-link">
                    <img src="images/cart-img.png" alt="Корзина" class="nav-icon">
                    Корзина
                </a>

                <a href="/profile" class="nav-link">
                    <img src="images/profile-img.png" alt="Профиль" class="nav-icon profile-icon">
                    <span class="profile-text">Профиль</span>
                </a>

                <a href="/login" class="nav-link">
                    <img src="images/join-img.png" alt="Войти" class="nav-icon">
                    Войти
                </a>
            </nav>
        </div>
    </div>
</header>

<!-- Основной контент главной страницы -->
<main class="main-content">
    <div class="container">
        <!-- Каталог товаров -->
        <section class="catalog">
            <div class="catalog-header">
                <h2 class="catalog-title">Каталог товаров</h2>
                <div class="catalog-filters">
                    <select id="categoryFilter" class="filter-select">
                        <option value="">Все категории</option>
                        <option value="ELECTRONICS">Электроника</option>
                        <option value="CLOTHING">Одежда</option>
                        <option value="BOOKS">Книги</option>
                        <option value="FOOD">Еда</option>
                        <option value="SPORTS">Спорт</option>
                        <option value="HOME">Дом</option>
                        <option value="BEAUTY">Красота</option>
                        <option value="OTHER">Другое</option>
                    </select>
                    <select id="sortFilter" class="filter-select">
                        <option value="">Сортировка</option>
                        <option value="name">По названию</option>
                        <option value="price_asc">По цене (возр.)</option>
                        <option value="price_desc">По цене (убыв.)</option>
                    </select>
                </div>
            </div>

            <div id="productsGrid" class="products-grid">
                <!-- Товары будут загружены через JavaScript -->
            </div>

            <!-- Пагинация -->
            <div class="pagination-container">
                <div id="pagination" class="pagination">
                    <button id="prevPage" class="pagination-btn" disabled>
                        ← Назад
                    </button>

                    <div class="pagination-numbers" id="paginationNumbers">
                        <!-- Номера страниц будут генерироваться динамически -->
                    </div>

                    <button id="nextPage" class="pagination-btn">
                        Вперед →
                    </button>
                </div>

                <!-- Информация о странице -->
                <div id="pageInfo" class="page-info">
                    Показано товаров: <span id="shownItems">0</span> из <span id="totalItems">0</span>
                </div>
            </div>
        </section>
    </div>
</main>

<script src="js/catalogScript.js"></script>
<script src="js/mainFormScript.js"></script>

</body>
</html>
